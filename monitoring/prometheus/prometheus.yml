global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'latency-proxy'
    static_configs:
      - targets: ['proxy:9090']  # main proxy (HTTP info pages + DTN)

  # Per-body SOCKS proxies. Each runs the same binary and now exposes /metrics
  # on :9090 (resolved by docker-compose service name). This is where the actual
  # proxy-through usage (requests, bandwidth, UDP packets) is recorded.
  - job_name: 'latency-socks'
    static_configs:
      - targets:
          - 'socks-mars:9090'
          - 'socks-moon:9090'
          - 'socks-venus:9090'
          - 'socks-mercury:9090'
          - 'socks-jupiter:9090'
          - 'socks-saturn:9090'
          - 'socks-europa:9090'
          - 'socks-titan:9090'
          - 'socks-voyager1:9090'
          - 'socks-jwst:9090'

  # Node exporter commented due to permission issues
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['172.18.0.6:9093']  # Using direct IP for alertmanager (if used)

rule_files:
  - rules/*.yml

